[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
evm_version = "cancun"

# NOTE: The verifier contracts (ECDSAVerifier, MultisigVerifier, WebAuthnVerifier)
# use `verbatim` for custom EVM opcodes, which is only available in standalone Yul.
# Use `./build.sh` to compile the Yul versions in yul/ directory.
# Only IFrameVerifier.sol compiles with standard `forge build`.
