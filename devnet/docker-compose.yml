version: "3.8"

services:
  reth:
    image: eip8141-reth:latest
    build:
      context: ../reth-eip8141
      dockerfile: Dockerfile
    ports:
      - "8545:8545"
      - "8546:8546"
    volumes:
      - reth-data:/data
      - ./genesis.json:/genesis.json:ro
    command: >
      node --chain /genesis.json --datadir /data
      --dev --dev.block-time 2s
      --http --http.addr 0.0.0.0 --http.port 8545
      --http.api eth,net,web3,debug,txpool
      --ws --ws.addr 0.0.0.0 --ws.port 8546
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8545"]
      interval: 5s
      timeout: 3s
      retries: 10

  showcase:
    build: ../showcase
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_RPC_URL=http://reth:8545
      - NEXT_PUBLIC_WS_URL=ws://reth:8546
      - NEXT_PUBLIC_CHAIN_ID=8141
    depends_on:
      reth:
        condition: service_healthy

volumes:
  reth-data:
