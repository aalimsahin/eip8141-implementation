version: "3.8"

services:
  reth-eip8141:
    build:
      context: ../reth-eip8141
      dockerfile: ../devnet/Dockerfile
    ports:
      - "8545:8545"
      - "8546:8546"
      - "30303:30303"
    volumes:
      - reth-data:/data
    command: >
      node --dev --dev.block-time 2s
      --datadir /data
      --chain /genesis.json
      --http --http.addr 0.0.0.0 --http.port 8545
      --http.api "eth,net,web3,txpool,debug,trace"
      --http.corsdomain "*"
      --ws --ws.addr 0.0.0.0 --ws.port 8546
      --ws.api "eth,net,web3,txpool"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8545"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  reth-data:
